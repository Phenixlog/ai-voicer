# Théoria - Production Deployment Pipeline
# Deploy to Render.com on successful merge to main

name: Deploy to Production

on:
  push:
    branches: [main]
    paths-ignore:
      - "**.md"
      - "docs/**"
      - ".github/**"

concurrency:
  group: production
  cancel-in-progress: true

jobs:
  # ==========================================================================
  # Pre-deployment Checks
  # ==========================================================================
  pre-deploy-checks:
    name: Pre-deployment Checks
    runs-on: ubuntu-latest
    outputs:
      should_deploy: ${{ steps.check.outputs.should_deploy }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check for skip deployment
        id: check
        run: |
          # Skip if commit message contains [skip deploy]
          if [[ "${{ github.event.head_commit.message }}" == *"[skip deploy]"* ]]; then
            echo "should_deploy=false" >> $GITHUB_OUTPUT
            echo "⏭️ Deployment skipped via commit message"
          else
            echo "should_deploy=true" >> $GITHUB_OUTPUT
            echo "✅ Deployment enabled"
          fi

      - name: Verify required secrets
        run: |
          if [ -z "${{ secrets.RENDER_API_KEY }}" ]; then
            echo "❌ RENDER_API_KEY is not set!"
            exit 1
          fi
          if [ -z "${{ secrets.RENDER_SERVICE_ID }}" ]; then
            echo "❌ RENDER_SERVICE_ID is not set!"
            exit 1
          fi
          echo "✅ Required secrets are configured"

  # ==========================================================================
  # Run Full CI Suite
  # ==========================================================================
  ci:
    name: Run CI
    needs: pre-deploy-checks
    if: needs.pre-deploy-checks.outputs.should_deploy == 'true'
    uses: ./.github/workflows/ci.yml

  # ==========================================================================
  # Deploy to Render.com
  # ==========================================================================
  deploy-render:
    name: Deploy to Render
    runs-on: ubuntu-latest
    needs: [pre-deploy-checks, ci]
    if: needs.pre-deploy-checks.outputs.should_deploy == 'true'
    environment:
      name: production
      url: https://theoria-api.onrender.com
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to Render
        env:
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
          RENDER_SERVICE_ID: ${{ secrets.RENDER_SERVICE_ID }}
        run: |
          echo "🚀 Triggering deployment on Render.com..."
          
          # Deploy using Render API
          curl -X POST \
            -H "Authorization: Bearer $RENDER_API_KEY" \
            -H "Content-Type: application/json" \
            "https://api.render.com/v1/services/$RENDER_SERVICE_ID/deploys" \
            -d '{"clearCache": "do_not_clear"}'
          
          echo ""
          echo "✅ Deployment triggered successfully!"
          echo "📊 Monitor at: https://dashboard.render.com/web/$RENDER_SERVICE_ID"

      - name: Wait for deployment (optional)
        if: false  # Set to true to enable waiting
        env:
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
          RENDER_SERVICE_ID: ${{ secrets.RENDER_SERVICE_ID }}
        run: |
          echo "⏳ Waiting for deployment to complete..."
          for i in {1..30}; do
            sleep 10
            STATUS=$(curl -s -H "Authorization: Bearer $RENDER_API_KEY" \
              "https://api.render.com/v1/services/$RENDER_SERVICE_ID" | \
              jq -r '.service.deploys[0].status')
            echo "Status: $STATUS"
            if [ "$STATUS" = "live" ]; then
              echo "✅ Deployment successful!"
              exit 0
            elif [ "$STATUS" = "failed" ]; then
              echo "❌ Deployment failed!"
              exit 1
            fi
          done
          echo "⚠️ Deployment timeout - check Render dashboard"

  # ==========================================================================
  # Post-deployment Verification
  # ==========================================================================
  verify-deployment:
    name: Verify Deployment
    runs-on: ubuntu-latest
    needs: deploy-render
    steps:
      - name: Wait for service to be ready
        run: sleep 30

      - name: Health check
        run: |
          API_URL="https://theoria-api.onrender.com"
          MAX_RETRIES=10
          RETRY_COUNT=0
          
          while [ $RETRY_COUNT -lt $MAX_RETRIES ]; do
            echo "Health check attempt $((RETRY_COUNT + 1))/$MAX_RETRIES..."
            
            HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$API_URL/health" || echo "000")
            
            if [ "$HTTP_STATUS" = "200" ]; then
              echo "✅ Health check passed!"
              curl -s "$API_URL/health" | jq .
              exit 0
            fi
            
            echo "⏳ Service not ready yet (status: $HTTP_STATUS)..."
            RETRY_COUNT=$((RETRY_COUNT + 1))
            sleep 15
          done
          
          echo "❌ Health check failed after $MAX_RETRIES attempts"
          exit 1

      - name: Run smoke tests
        env:
          API_URL: https://theoria-api.onrender.com
          API_TOKEN: ${{ secrets.AI_VOICER_API_AUTH_TOKEN }}
        run: |
          echo "Running smoke tests..."
          
          # Test 1: Health endpoint
          curl -sf "$API_URL/health" > /dev/null && echo "✅ Health endpoint OK"
          
          # Test 2: API info (if available)
          curl -sf "$API_URL/" > /dev/null && echo "✅ Root endpoint OK" || echo "ℹ️ Root endpoint not configured"
          
          echo "✅ Smoke tests completed"

  # ==========================================================================
  # Notify on Success/Failure
  # ==========================================================================
  notify:
    name: Notify
    runs-on: ubuntu-latest
    needs: [deploy-render, verify-deployment]
    if: always()
    steps:
      - name: Notify success
        if: needs.deploy-render.result == 'success' && needs.verify-deployment.result == 'success'
        run: |
          echo "🎉 Deployment to production successful!"
          echo "🌐 API URL: https://theoria-api.onrender.com"
          echo "📊 Dashboard: https://dashboard.render.com"
          # Add Slack/Discord notification here

      - name: Notify failure
        if: failure()
        run: |
          echo "❌ Deployment failed!"
          echo "Check the workflow logs for details."
          # Add Slack/Discord notification here
