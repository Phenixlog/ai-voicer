# Théoria - CI Pipeline
# Run tests, linting, and security checks on every PR and push

name: CI

on:
  push:
    branches: [main, develop]
    paths-ignore:
      - "**.md"
      - "docs/**"
  pull_request:
    branches: [main, develop]
    paths-ignore:
      - "**.md"
      - "docs/**"

env:
  PYTHON_VERSION: "3.11"

jobs:
  # ==========================================================================
  # Lint & Format Check
  # ==========================================================================
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff mypy black isort
          pip install -r requirements.txt

      - name: Run Ruff (linting)
        run: ruff check src/

      - name: Run Black (format check)
        run: black --check src/

      - name: Run isort (import sorting)
        run: isort --check-only src/

      - name: Run MyPy (type checking)
        run: mypy src/ --ignore-missing-imports

  # ==========================================================================
  # Security Scan
  # ==========================================================================
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Bandit (security linter)
        uses: PyCQA/bandit@main
        with:
          args: "-r src/ -f json -o bandit-report.json || true"

      - name: Run pip-audit (dependency vulnerabilities)
        uses: pypa/gh-action-pip-audit@v1
        with:
          inputs: requirements.txt

      - name: Upload Bandit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bandit-report
          path: bandit-report.json

  # ==========================================================================
  # Unit Tests
  # ==========================================================================
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: theoria_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-asyncio pytest-cov httpx
          pip install -r requirements.txt

      - name: Run tests with coverage
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/theoria_test
          REDIS_URL: redis://localhost:6379/1
          MISTRAL_API_KEY: test_key_for_ci
          AI_VOICER_API_AUTH_TOKEN: test_token
        run: |
          pytest tests/ -v --cov=src --cov-report=xml --cov-report=term

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml
          flags: unittests
          name: codecov-umbrella

  # ==========================================================================
  # Build Docker Image
  # ==========================================================================
  build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: [lint, security, test]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./infrastructure/Dockerfile
          push: false
          tags: theoria-api:test
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Test image runs
        run: |
          docker run -d --name test-api \
            -e MISTRAL_API_KEY=test \
            -e AI_VOICER_API_AUTH_TOKEN=test \
            -p 8000:8000 \
            theoria-api:test
          sleep 5
          docker exec test-api curl -f http://localhost:8000/health || exit 1
          docker stop test-api

  # ==========================================================================
  # Notify on Failure
  # ==========================================================================
  notify:
    name: Notify
    runs-on: ubuntu-latest
    needs: [lint, security, test, build]
    if: failure() && github.ref == 'refs/heads/main'
    steps:
      - name: Notify Slack/Discord on failure
        run: |
          echo "CI failed on main branch!"
          # Add your notification webhook here
          # curl -X POST -H 'Content-type: application/json' \
          #   --data '{"text":"🚨 CI Failed for Théoria"}' \
          #   YOUR_WEBHOOK_URL
