<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Théoria HUD - Processing</title>
  
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Inter', sans-serif;
      background: transparent;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }
    
    /* HUD Container */
    .hud {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 20px;
      background: rgba(15, 23, 42, 0.9);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-radius: 100px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      box-shadow: 
        0 8px 32px rgba(0, 0, 0, 0.4),
        0 0 0 1px rgba(255, 255, 255, 0.05) inset;
      animation: hudEnter 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
    }
    
    @keyframes hudEnter {
      from {
        opacity: 0;
        transform: translateY(10px) scale(0.95);
      }
      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }
    
    /* Spinner */
    .spinner {
      width: 16px;
      height: 16px;
      position: relative;
    }
    
    .spinner-ring {
      position: absolute;
      inset: 0;
      border: 2px solid transparent;
      border-top-color: #f59e0b;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    
    .spinner-ring:nth-child(2) {
      inset: 3px;
      border-top-color: #fbbf24;
      animation-duration: 0.6s;
      animation-direction: reverse;
    }
    
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    
    /* Text Content */
    .hud-content {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }
    
    .hud-status {
      font-size: 13px;
      font-weight: 600;
      color: #fbbf24;
      letter-spacing: -0.2px;
    }
    
    .hud-hint {
      font-size: 11px;
      color: rgba(148, 163, 184, 0.8);
    }
    
    /* Progress Dots */
    .progress-dots {
      display: flex;
      gap: 4px;
    }
    
    .progress-dot {
      width: 4px;
      height: 4px;
      background: #fbbf24;
      border-radius: 50%;
      animation: dotPulse 1.4s ease-in-out infinite;
    }
    
    .progress-dot:nth-child(1) { animation-delay: 0s; }
    .progress-dot:nth-child(2) { animation-delay: 0.2s; }
    .progress-dot:nth-child(3) { animation-delay: 0.4s; }
    
    @keyframes dotPulse {
      0%, 80%, 100% { transform: scale(0.6); opacity: 0.4; }
      40% { transform: scale(1); opacity: 1; }
    }
    
    /* Demo Container */
    .demo-container {
      display: flex;
      flex-direction: column;
      gap: 40px;
      padding: 40px;
      background: #1e293b;
      border-radius: 20px;
    }
    
    .demo-label {
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #64748b;
      margin-bottom: 12px;
    }
  </style>
</head>
<body>
  <div class="demo-container">
    <!-- Processing State -->
    <div>
      <div class="demo-label">État: Transcription...</div>
      <div class="hud">
        <div class="spinner">
          <div class="spinner-ring"></div>
          <div class="spinner-ring"></div>
        </div>
        <div class="hud-content">
          <div class="hud-status">Transcription...</div>
          <div class="hud-hint">Nettoyage du texte</div>
        </div>
        <div class="progress-dots">
          <div class="progress-dot"></div>
          <div class="progress-dot"></div>
          <div class="progress-dot"></div>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
