<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Théoria HUD - Success</title>
  
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Inter', sans-serif;
      background: transparent;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }
    
    /* HUD Container */
    .hud {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 20px;
      background: rgba(15, 23, 42, 0.9);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-radius: 100px;
      border: 1px solid rgba(16, 185, 129, 0.3);
      box-shadow: 
        0 8px 32px rgba(0, 0, 0, 0.4),
        0 0 20px rgba(16, 185, 129, 0.1),
        0 0 0 1px rgba(255, 255, 255, 0.05) inset;
      animation: hudEnter 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
    }
    
    @keyframes hudEnter {
      from {
        opacity: 0;
        transform: translateY(10px) scale(0.95);
      }
      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }
    
    /* Success Icon */
    .success-icon {
      width: 16px;
      height: 16px;
      background: #10b981;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      animation: successPop 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
    }
    
    .success-icon::before {
      content: '';
      width: 5px;
      height: 8px;
      border: solid white;
      border-width: 0 2px 2px 0;
      transform: rotate(45deg) translate(-1px, -1px);
    }
    
    @keyframes successPop {
      0% { transform: scale(0); }
      50% { transform: scale(1.2); }
      100% { transform: scale(1); }
    }
    
    /* Text Content */
    .hud-content {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }
    
    .hud-status {
      font-size: 13px;
      font-weight: 600;
      color: #10b981;
      letter-spacing: -0.2px;
    }
    
    .hud-hint {
      font-size: 11px;
      color: rgba(148, 163, 184, 0.8);
    }
    
    /* Stats */
    .hud-stats {
      display: flex;
      align-items: center;
      gap: 8px;
      padding-left: 8px;
      border-left: 1px solid rgba(255, 255, 255, 0.1);
    }
    
    .stat {
      display: flex;
      align-items: center;
      gap: 4px;
      font-size: 11px;
      color: rgba(148, 163, 184, 0.8);
    }
    
    .stat svg {
      width: 10px;
      height: 10px;
      color: #10b981;
    }
    
    /* Demo Container */
    .demo-container {
      display: flex;
      flex-direction: column;
      gap: 40px;
      padding: 40px;
      background: #1e293b;
      border-radius: 20px;
    }
    
    .demo-label {
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #64748b;
      margin-bottom: 12px;
    }
  </style>
</head>
<body>
  <div class="demo-container">
    <!-- Success State -->
    <div>
      <div class="demo-label">État: Succès</div>
      <div class="hud">
        <div class="success-icon"></div>
        <div class="hud-content">
          <div class="hud-status">Texte injecté</div>
          <div class="hud-hint">142 mots • 12 secondes</div>
        </div>
        <div class="hud-stats">
          <div class="stat">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <polyline points="20 6 9 17 4 12"/>
            </svg>
            99%
          </div>
        </div>
      </div>
    </div>
    
    <!-- Success - Short -->
    <div>
      <div class="demo-label">Succès compact</div>
      <div class="hud">
        <div class="success-icon"></div>
        <div class="hud-content">
          <div class="hud-status">Prêt</div>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
